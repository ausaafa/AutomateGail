<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>success@pharmacyprep.com</title>

  <style>
    :root {
      --bg: #f4f5f7;
      --panel: #ffffff;
      --text: #070707;
      --muted: #343434;
      --line: #d0d5dd;
      --soft: #f7f7f7;
      --black: #050505;
      --black-soft: #f1f1f1;
      --blue: #050505;
      --blue-soft: #f1f1f1;
      --green: #050505;
      --green-soft: #f1f1f1;
      --red: #b42318;
      --red-soft: #fff5f5;
      --amber: #92400e;
      --amber-soft: #fffbeb;
      --purple: #050505;
      --purple-soft: #f1f1f1;
      --shadow: 0 12px 28px rgba(16, 24, 40, 0.10);
      --radius: 6px;
      --page-gutter: 20px;
    }

    * { box-sizing: border-box; }

    html,
    body {
      height: 100%;
    }

    html {
      overflow: hidden;
      scrollbar-gutter: stable both-edges;
    }

    body {
      margin: 0;
      width: 100%;
      min-width: 0;
      min-height: 100vh;
      overflow: hidden;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      font-size: 16px;
    }

    .shell {
      width: 100vw;
      max-width: none;
      min-width: 0;
      height: 100dvh;
      margin: 0;
      padding: var(--page-gutter);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 14px;
      overflow: hidden;
    }

    .topbar {
      min-width: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 0;
      flex: 0 0 auto;
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 0;
      max-width: 100%;
    }

    .logo,
    .brand h1 {
      display: none;
    }

    .connected {
      color: var(--black);
      font-size: clamp(20px, 1.65vw, 30px);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.035em;
      word-break: break-word;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      flex: 0 0 auto;
    }

    button {
      border: 0;
      cursor: pointer;
      border-radius: 4px;
      padding: 12px 16px;
      min-height: 44px;
      font-size: 14px;
      font-weight: 900;
      transition: transform .12s ease, opacity .12s ease, background .12s ease;
      white-space: nowrap;
    }

    .actions button {
      min-width: 124px;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    .primary { background: var(--black); color: white; }
    .secondary { background: white; border: 1px solid var(--black); color: var(--black); }
    .success { background: var(--black); color: white; }
    .danger { background: var(--red-soft); color: var(--red); border: 1px solid #fecdd3; }

    .kill-switch {
      border: 1px solid var(--black);
      background: var(--black);
      color: #ffffff;
      font-weight: 900;
    }

    .kill-switch.off {
      background: var(--red-soft);
      color: var(--red);
      border-color: #fda4af;
    }

    .panel {
      min-width: 0;
      background: rgba(255,255,255,.96);
      border: 1px solid rgba(255,255,255,.95);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 18px;
    }

    .hidden-status {
      display: none;
    }

    .loader {
      display: none;
      gap: 9px;
      align-items: center;
      color: var(--muted);
      font-weight: 850;
      margin-top: 10px;
    }

    .spinner {
      width: 17px;
      height: 17px;
      border: 3px solid #e5e7eb;
      border-top-color: var(--black);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .workspace {
      width: 100%;
      display: grid;
      grid-template-columns: 235px minmax(0, 1fr);
      gap: 14px;
      align-items: stretch;
      min-height: 0;
      min-width: 0;
      height: 100%;
      overflow: hidden;
    }

    .left-rail {
      min-width: 0;
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 14px;
      overflow: hidden;
      padding-right: 2px;
    }

    .sidebar {
      display: grid;
      gap: 10px;
      padding: 12px;
    }

    .stats {
      min-height: 0;
      height: 100%;
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding: 12px;
      overflow: hidden;
    }

    .stat {
      min-height: 0;
      border-radius: 6px;
      background: white;
      border: 1px solid var(--line);
      padding: 15px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .stat-number {
      font-size: 29px;
      letter-spacing: -0.05em;
      font-weight: 950;
      line-height: 1;
    }

    .stat-label {
      color: var(--muted);
      font-weight: 850;
      margin-top: 6px;
      font-size: 13px;
    }

    .nav-btn {
      width: 100%;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-radius: 5px;
      padding: 15px;
      background: white;
      border: 1px solid var(--line);
      color: var(--text);
    }

    .nav-btn.active {
      background: var(--black-soft);
      border-color: var(--black);
      color: var(--black);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 30px;
      height: 26px;
      padding: 0 9px;
      border-radius: 5px;
      background: #ededed;
      color: #344054;
      font-size: 13px;
      font-weight: 950;
    }

    .nav-btn.active .pill { background: var(--black); color: white; }

    .main-panel {
      width: 100%;
      min-width: 0;
      height: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 30px;
      letter-spacing: -0.05em;
    }

    .section-note {
      color: var(--muted);
      font-weight: 750;
      line-height: 1.55;
      margin: 0 0 14px;
      flex: 0 0 auto;
    }

    .list {
      flex: 1 1 auto;
      min-height: 0;
      min-width: 0;
      display: grid;
      align-content: start;
      gap: 14px;
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-gutter: stable both-edges;
      padding: 2px 6px 4px 2px;
    }

    .list,
    .left-rail,
    .box-body,
    .reply-preview,
    .modal-email-body,
    .modal-grid {
      scrollbar-width: auto;
      scrollbar-color: #050505 #e5e7eb;
    }

    .list::-webkit-scrollbar,
    .left-rail::-webkit-scrollbar,
    .box-body::-webkit-scrollbar,
    .reply-preview::-webkit-scrollbar,
    .modal-email-body::-webkit-scrollbar,
    .modal-grid::-webkit-scrollbar {
      width: 16px;
      height: 16px;
    }

    .list::-webkit-scrollbar-track,
    .left-rail::-webkit-scrollbar-track,
    .box-body::-webkit-scrollbar-track,
    .reply-preview::-webkit-scrollbar-track,
    .modal-email-body::-webkit-scrollbar-track,
    .modal-grid::-webkit-scrollbar-track {
      background: #e5e7eb;
      border-radius: 999px;
    }

    .list::-webkit-scrollbar-thumb,
    .left-rail::-webkit-scrollbar-thumb,
    .box-body::-webkit-scrollbar-thumb,
    .reply-preview::-webkit-scrollbar-thumb,
    .modal-email-body::-webkit-scrollbar-thumb,
    .modal-grid::-webkit-scrollbar-thumb {
      background: #050505;
      border-radius: 999px;
      border: 3px solid #e5e7eb;
    }

    .card {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: white;
      padding: 16px;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .card-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.22;
      letter-spacing: -0.035em;
      font-weight: 950;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 5px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 950;
      white-space: nowrap;
      background: #f2f4f7;
      color: #344054;
      border: 1px solid #e4e7ec;
    }

    .badge.green { background: var(--green-soft); color: var(--green); border-color: #abefc6; }
    .badge.blue { background: var(--black-soft); color: var(--black); border-color: var(--black); }
    .badge.purple { background: var(--purple-soft); color: var(--purple); border-color: #d9d6fe; }
    .badge.red { background: var(--red-soft); color: var(--red); border-color: #fecdd3; }

    #sectionBadge { display: none; }

    .meta {
      color: #242424;
      line-height: 1.5;
      font-size: 15px;
      font-weight: 800;
      word-break: break-word;
      margin-bottom: 12px;
    }

    .summary {
      padding: 14px;
      border-radius: 10px;
      background: #f8fafc;
      border: 1px solid var(--line);
      font-weight: 750;
      line-height: 1.55;
      color: #111111;
      margin-bottom: 13px;
    }

    .email-pair {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 13px;
      margin-top: 12px;
    }

    .email-box {
      border-radius: 6px;
      border: 1px solid var(--line);
      overflow: hidden;
      background: #fcfcfd;
      min-width: 0;
    }

    .box-title {
      padding: 12px 14px;
      background: #f9fafb;
      border-bottom: 1px solid var(--line);
      font-weight: 950;
      font-size: 14px;
    }

    .box-title.response { color: var(--black); }
    .box-title.original { color: #344054; }

    .box-body {
      padding: 18px;
      max-height: 340px;
      min-height: 260px;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-gutter: stable;
      white-space: pre-wrap;
      color: #000000;
      font-size: 19px;
      line-height: 1.65;
      font-weight: 750;
    }

    .compact-line { margin-bottom: 12px; color: #344054; }

    .reply-subject {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 12px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 10px;
      outline: none;
    }

    .reply-body {
      width: 100%;
      min-height: 190px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 12px;
      font: inherit;
      font-size: 14px;
      line-height: 1.55;
      outline: none;
    }



    .reply-preview {
      color: #000000;
      line-height: 1.65;
      font-size: 19px;
      font-weight: 750;
      white-space: pre-wrap;
      max-height: 340px;
      min-height: 260px;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-gutter: stable;
      padding-right: 0;
    }

    .reply-edit-wrap {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .reply-edit-wrap.open {
      display: block;
    }

    .expand-btn {
      background: var(--black);
      color: white;
      border: 1px solid var(--black);
      padding: 12px 20px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 950;
      min-width: 82px;
    }

    .response-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      background: #f9fafb;
      border-bottom: 1px solid var(--line);
      font-weight: 950;
      font-size: 14px;
      color: var(--black);
    }

    .card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-top: 13px;
    }

    .briefing {
      white-space: pre-wrap;
      line-height: 1.7;
      color: #344054;
      font-weight: 650;
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 17px;
    }

    .empty {
      padding: 18px;
      border-radius: 6px;
      border: 1px dashed #98a2b3;
      background: #f8fafc;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.6;
    }

    .toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      display: none;
      max-width: 480px;
      background: #101828;
      color: white;
      padding: 15px 17px;
      border-radius: 6px;
      box-shadow: var(--shadow);
      font-weight: 750;
      line-height: 1.45;
      z-index: 99;
    }



    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(15, 23, 42, .48);
      backdrop-filter: blur(5px);
      z-index: 120;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      width: min(1500px, 98vw);
      max-height: 92vh;
      background: white;
      border-radius: 8px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .32);
      border: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      padding: 22px 24px;
      border-bottom: 1px solid var(--line);
      background: #fbfcff;
    }

    .modal-title {
      margin: 0;
      font-size: 27px;
      line-height: 1.18;
      letter-spacing: -0.045em;
    }

    .modal-subtitle {
      margin-top: 7px;
      color: var(--muted);
      font-weight: 750;
      line-height: 1.5;
    }

    .modal-close {
      background: white;
      border: 1px solid var(--line);
      color: #344054;
      border-radius: 4px;
      padding: 10px 13px;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: .82fr 1.18fr;
      gap: 18px;
      padding: 20px 24px;
      min-height: 0;
      overflow: auto;
    }

    .modal-section {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: #fcfcfd;
    }

    .modal-section-title {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #f9fafb;
      font-weight: 950;
    }

    .modal-email-body {
      padding: 18px;
      white-space: pre-wrap;
      color: #000000;
      font-size: 18px;
      line-height: 1.6;
      font-weight: 700;
      max-height: 58vh;
      overflow: auto;
    }

    .modal-form {
      padding: 16px;
      display: grid;
      gap: 12px;
      min-height: 0;
    }

    .modal-label {
      color: #344054;
      font-weight: 950;
      font-size: 13px;
      margin-bottom: -5px;
    }

    .modal-to {
      padding: 12px 13px;
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 4px;
      color: #050505;
      font-size: 15px;
      font-weight: 700;
      word-break: break-word;
    }

    .modal-input,
    .modal-textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 13px;
      font: inherit;
      font-size: 16px;
      outline: none;
      background: white;
    }

    .modal-input:focus,
    .modal-textarea:focus {
      border-color: var(--black);
      box-shadow: 0 0 0 3px rgba(5, 5, 5, .10);
    }

    .modal-textarea {
      min-height: 390px;
      max-height: 52vh;
      resize: vertical;
      line-height: 1.65;
      overflow-y: auto;
    }



    .template-select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 13px;
      font: inherit;
      font-size: 16px;
      outline: none;
      background: white;
    }

    .template-hint {
      margin-top: -6px;
      color: #475467;
      font-weight: 750;
      font-size: 12px;
      line-height: 1.35;
    }

    .modal-textarea[contenteditable="true"] {
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .modal-textarea[contenteditable="true"] p {
      margin: 0 0 10px 0;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 16px 24px;
      border-top: 1px solid var(--line);
      background: #fbfcff;
    }


    /* Final UI tightening: sharper corners, stronger black text, no blue action buttons. */
    .panel, .card, .email-box, .summary, .briefing, .empty, .modal-section, .toast { border-radius: 6px; }
    button, .nav-btn, .reply-subject, .reply-body, .modal-input, .modal-textarea, .modal-to, .modal-close, .expand-btn { border-radius: 4px; }
    .primary, .success, .expand-btn { background: #050505; border-color: #050505; color: #ffffff; }
    .primary:hover, .success:hover, .expand-btn:hover { background: #1a1a1a; }
    .secondary { border-color: #050505; color: #050505; }
    .box-body, .reply-preview, .reply-preview-clean, .modal-email-body, .modal-textarea { color: #000000; font-size: 19px; line-height: 1.65; font-weight: 750; }
    .box-body.reply-preview-clean { min-height: 260px; }
    .summary, .briefing, .section-note, .meta, .connected, .stat-label { color: #111111; }
    .box-title.response, .response-head { color: #050505; }



    /* Final thread timeline UI: connected faded message cards for older replies/forwards. */
    .thread-box-body { padding: 14px; white-space: normal; }
    .thread-timeline {
      position: relative;
      display: grid;
      gap: 0;
      padding: 4px 0 4px 0;
      white-space: normal;
    }
    .thread-node {
      position: relative;
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      min-width: 0;
      padding-bottom: 16px;
    }
    .thread-node:not(:last-child)::before {
      content: "";
      position: absolute;
      left: 15px;
      top: 20px;
      bottom: -4px;
      width: 2px;
      background: #cfd5df;
    }
    .thread-node::after {
      content: "";
      position: absolute;
      left: 16px;
      top: 20px;
      width: 18px;
      height: 2px;
      background: #cfd5df;
    }
    .thread-dot {
      position: relative;
      z-index: 1;
      width: 12px;
      height: 12px;
      margin: 14px 0 0 10px;
      border-radius: 999px;
      border: 2px solid #98a2b3;
      background: #ffffff;
      box-shadow: 0 0 0 4px #f8fafc;
    }
    .thread-card-ui {
      min-width: 0;
      border: 1px solid #d0d5dd;
      background: #f8fafc;
      border-radius: 8px;
      padding: 13px 15px;
      color: #101828;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.9);
    }
    .thread-node:first-child .thread-card-ui { background: #ffffff; }
    .thread-card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      padding-bottom: 9px;
      margin-bottom: 10px;
      border-bottom: 1px solid #e4e7ec;
      font-size: 13px;
      line-height: 1.45;
    }
    .thread-card-title { font-weight: 950; color: #050505; }
    .thread-card-date { font-weight: 850; color: #475467; white-space: nowrap; }
    .thread-card-meta {
      color: #344054;
      font-size: 13px;
      line-height: 1.5;
      font-weight: 800;
      margin-bottom: 8px;
      word-break: break-word;
    }
    .thread-card-subject { font-weight: 950; color: #111827; margin-bottom: 9px; }
    .thread-card-body {
      color: #000000;
      font-size: 16px;
      line-height: 1.55;
      font-weight: 650;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .thread-card-body.compact {
      max-height: 360px;
      overflow-y: auto;
      scrollbar-gutter: stable;
    }
    .forward-chip {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      margin-bottom: 8px;
      padding: 4px 8px;
      border: 1px solid #d0d5dd;
      border-radius: 4px;
      background: #ffffff;
      color: #475467;
      font-size: 12px;
      font-weight: 950;
    }

    @media (max-width: 1120px) {
      html, body { overflow-y: auto; overflow-x: hidden; }
      .shell {
        width: 100vw;
        max-width: none;
        height: auto;
        min-height: 100dvh;
        margin: 0;
        padding: var(--page-gutter);
        display: flex;
        flex-direction: column;
        overflow: visible;
      }
      .workspace {
        height: auto;
        grid-template-columns: 1fr;
        overflow: visible;
      }
      .left-rail {
        height: auto;
        overflow: visible;
      }
      .sidebar { grid-template-columns: repeat(4, 1fr); }
      .stats {
        height: auto;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: none;
        overflow: visible;
      }
      .main-panel {
        height: min(680px, calc(100dvh - 40px));
      }
      .email-pair { grid-template-columns: 1fr; }
      .modal-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 760px) {
      :root { --page-gutter: 12px; }
      .shell { width: 100vw; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .actions { width: 100%; display: grid; grid-template-columns: 1fr; }
      button { width: 100%; }
      .sidebar { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr; }
      .section-head { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>

<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="connected" id="connectedEmail">success@pharmacyprep.com</div>
      </div>

      <div class="actions">
        <button class="kill-switch" onclick="toggleAutoReply()" id="killSwitchBtn">Auto Reply: On</button>
        <button class="primary" onclick="fullScanNow()" id="scanBtn">Full Scan</button>
        <button class="secondary" onclick="refreshNow()">Refresh</button>
      </div>
    </header>

    <section class="workspace">
      <div class="left-rail">
        <nav class="panel sidebar">
          <button class="nav-btn" onclick="setSection('orders')" id="nav-orders">Orders <span class="pill" id="pill-orders">0</span></button>
          <button class="nav-btn active" onclick="setSection('work')" id="nav-work">Work Email <span class="pill" id="pill-work">0</span></button>
          <button class="nav-btn" onclick="setSection('renewals')" id="nav-renewals">Renewals <span class="pill" id="pill-renewals">0</span></button>
          <button class="nav-btn" onclick="setSection('personal')" id="nav-personal">Personal Email <span class="pill" id="pill-personal">0</span></button>
          <button class="nav-btn" onclick="setSection('summary')" id="nav-summary">AI Summary <span class="pill">Today</span></button>
        </nav>

        <section class="panel stats" aria-label="Email review totals">
          <div class="stat">
            <div class="stat-number" id="ordersReplied">0</div>
            <div class="stat-label">Orders Sent</div>
          </div>
          <div class="stat">
            <div class="stat-number" id="pendingReplies">0</div>
            <div class="stat-label">Replies Waiting</div>
          </div>
          <div class="stat">
            <div class="stat-number" id="workEmails">0</div>
            <div class="stat-label">Work Emails</div>
          </div>
          <div class="stat">
            <div class="stat-number" id="personalEmails">0</div>
            <div class="stat-label">Personal Emails</div>
          </div>
        </section>
      </div>

      <main class="panel main-panel">
        <div class="section-head">
          <h2 id="sectionTitle">Work Email</h2>
          <span class="badge blue" id="sectionBadge">Needs response</span>
        </div>
        <p class="section-note" id="sectionNote"></p>
        <div class="list" id="mainList"></div>
      </main>
    </section>
  </div>

  <div class="hidden-status" aria-hidden="true">
    <div id="statusText">Ready</div>
    <div class="loader" id="loadingBox"><div class="spinner"></div><span>Working...</span></div>
  </div>



  <div class="modal-backdrop" id="replyModal" onclick="closeReplyModalFromBackdrop(event)">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <div>
          <h2 class="modal-title" id="modalTitle">Review reply</h2>
          <div class="modal-subtitle" id="modalSubtitle">View the original email and edit the response before sending.</div>
        </div>
        <button class="modal-close" type="button" onclick="closeReplyModal()">Close</button>
      </div>

      <div class="modal-grid">
        <section class="modal-section">
          <div class="modal-section-title">Original Email</div>
          <div class="modal-email-body" id="modalOriginal"></div>
        </section>

        <section class="modal-section">
          <div class="modal-section-title">Response</div>
          <div class="modal-form">
            <div class="modal-label">To</div>
            <input class="modal-input" id="modalTo" placeholder="recipient@example.com" />
            <div class="modal-label">Subject</div>
            <input class="modal-input" id="modalSubject" />
            <select class="template-select" id="modalTemplateSelect" onchange="applyTemplate(this.value)">
              <option value="">Templates</option>
            </select>
            <div class="modal-label">Reply</div>
            <div class="modal-textarea" id="modalBody" contenteditable="true"></div>
          </div>
        </section>
      </div>

      <div class="modal-actions">
        <button class="success" type="button" id="modalSendBtn">Send Email</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let state = {
      activeSection: "work",
      orders: [],
      emails: [],
      pendingReplies: [],
      briefing: "",
      stats: {},
      automationSettings: {
        auto_reply_enabled: true,
        auto_scan_enabled: true,
        auto_scan_minutes: 1,
        last_auto_scan_at: ""
      },
      currentModalThreadId: "",
      templates: [],
      isScanning: false,
      autoScanTimer: null,
      dashboardTimer: null,
      hasInitialAutoScan: false
    };

    async function api(path, options = {}) {
      const response = await fetch(path, {
        headers: { "Content-Type": "application/json" },
        ...options
      });

      const data = await response.json();
      if (!response.ok || data.ok === false) throw new Error(data.error || "Request failed");
      return data;
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.style.display = "block";
      setTimeout(() => { toast.style.display = "none"; }, 5200);
    }

    function setLoading(isLoading, text = "Working...") {
      document.getElementById("loadingBox").style.display = isLoading ? "flex" : "none";
      document.getElementById("scanBtn").disabled = isLoading;
      document.getElementById("statusText").textContent = isLoading ? text : "Ready";
    }


    async function loadTemplates() {
      try {
        const data = await api("/api/templates");
        state.templates = Array.isArray(data.templates) ? data.templates : [];
      } catch (error) {
        state.templates = [];
      }
    }

    function populateTemplateDropdown() {
      const select = document.getElementById("modalTemplateSelect");
      if (!select) return;
      const current = select.value;
      select.innerHTML = `<option value="">Templates</option>` + state.templates.map(template => {
        return `<option value="${escapeAttr(template.id)}">${escapeHtml(template.title || template.subject || "Template")}</option>`;
      }).join("");
      select.value = current || "";
    }

    function applyTemplate(templateId) {
      if (!templateId) return;
      const template = state.templates.find(item => String(item.id) === String(templateId));
      if (!template) return;
      const subjectBox = document.getElementById("modalSubject");
      const bodyBox = document.getElementById("modalBody");
      if (subjectBox) subjectBox.value = template.subject || template.title || subjectBox.value || "Reply";
      if (bodyBox) bodyBox.innerHTML = template.body_html || escapeHtml(template.body_text || "").replaceAll("\n", "<br>");
      bodyBox.focus();
    }

    async function loadDashboard() {
      try {
        if (!state.templates.length) await loadTemplates();
        setLoading(true, "Refreshing dashboard...");
        const data = await api("/api/dashboard");

        document.getElementById("connectedEmail").textContent = data.connected_email || "Connected Gmail";
        state.orders = Array.isArray(data.orders) ? data.orders : [];
        state.emails = Array.isArray(data.emails) ? data.emails : [];
        state.pendingReplies = Array.isArray(data.pending_replies) ? data.pending_replies : [];
        state.briefing = data.briefing || "";
        state.stats = data.stats || {};
        state.automationSettings = {
          ...state.automationSettings,
          ...(data.automation_settings || {})
        };

        updateStats();
        syncKillSwitchButton();
        startAutoRefreshLoops();
        renderSection();
        triggerInitialAutoScan();
      } catch (error) {
        showToast(error.message);
      } finally {
        setLoading(false);
      }
    }

    function isRenewalEmail(email) {
      if (!email) return false;
      const details = email.renewal_details || {};
      const original = email.original || {};
      const haystack = [
        email.title || "",
        email.important_reason || "",
        original.subject || "",
        original.body || "",
        details.course || "",
        details.student_email || ""
      ].join(" ").toLowerCase();
      return Boolean(email.is_renewal_request || email.renewal_request || haystack.includes("account renewal request"));
    }

    function updateStats() {
      const ordersHandled = Number.isFinite(state.stats.orders_replied) ? state.stats.orders_replied : state.orders.filter(order => !order.reply).length;
      const pendingReplies = Number.isFinite(state.stats.pending_replies) ? state.stats.pending_replies : (state.pendingReplies.length || state.orders.filter(order => order.reply).length + state.emails.filter(email => email.reply).length);
      const renewalEmails = Number.isFinite(state.stats.renewal_emails) ? state.stats.renewal_emails : state.emails.filter(isRenewalEmail).length;
      const workEmails = Number.isFinite(state.stats.work_emails) ? state.stats.work_emails : state.emails.filter(email => email.category === "work" && !isRenewalEmail(email)).length;
      const personalEmails = Number.isFinite(state.stats.personal_emails) ? state.stats.personal_emails : state.emails.filter(email => email.category === "personal" && !isRenewalEmail(email)).length;

      document.getElementById("ordersReplied").textContent = ordersHandled;
      document.getElementById("pendingReplies").textContent = pendingReplies;
      document.getElementById("workEmails").textContent = workEmails;
      document.getElementById("personalEmails").textContent = personalEmails;

      document.getElementById("pill-orders").textContent = state.orders.length || 0;
      document.getElementById("pill-work").textContent = workEmails;
      const renewalPill = document.getElementById("pill-renewals");
      if (renewalPill) renewalPill.textContent = renewalEmails;
      document.getElementById("pill-personal").textContent = personalEmails;
    }

    function setSection(section) {
      state.activeSection = section;
      ["orders", "work", "renewals", "personal", "summary"].forEach(name => {
        document.getElementById(`nav-${name}`).classList.toggle("active", name === section);
      });
      renderSection();
    }

    function renderSection() {
      if (state.activeSection === "orders") renderOrders();
      if (state.activeSection === "work") renderEmailCategory("work");
      if (state.activeSection === "renewals") renderEmailCategory("renewals");
      if (state.activeSection === "personal") renderEmailCategory("personal");
      if (state.activeSection === "summary") renderSummary();
    }

    function sortNewestFirst(items, dateGetter) {
      return [...items].sort((a, b) => {
        const aValue = new Date(dateGetter(a) || 0).getTime() || 0;
        const bValue = new Date(dateGetter(b) || 0).getTime() || 0;
        return bValue - aValue;
      });
    }

    function renderOrders() {
      setHeader("Orders", "", "Orders stay visible here and are sorted with the newest at the top. New customer welcomes show a Reply button; already handled orders remain visible so you can confirm they were covered.");
      const list = document.getElementById("mainList");
      const orders = sortNewestFirst(state.orders, order => order.sort_ts || order.processed_at || (order.original && order.original.date));

      if (!orders.length) {
        list.innerHTML = `<div class="empty">No recent orders were found yet. Click <strong>Full Scan</strong> to check Gmail.</div>`;
        return;
      }

      list.innerHTML = orders.map(order => {
        const isWaiting = Boolean(order.reply);
        const reply = order.reply || {};
        const statusLabel = isWaiting ? "Needs Reply" : (order.status || "Already Replied");

        return `
          <article class="card order-card-simple">
            <div class="card-top">
              <div>
                <h3 class="card-title">Order #${escapeHtml(order.order_number || "Unknown")}</h3>
                <div class="meta order-meta">
                  <strong>Customer:</strong> ${escapeHtml(order.customer_name || "Unknown")}<br>
                  <strong>Email:</strong> ${escapeHtml(order.customer_email || "Unknown")}<br>
                  ${order.total ? `<strong>Total:</strong> ${escapeHtml(order.total)}<br>` : ""}
                  <strong>Status:</strong> ${escapeHtml(statusLabel)}<br>
                  <strong>Updated:</strong> ${formatDate(order.sort_ts || order.processed_at || (order.original && order.original.date))}
                </div>
              </div>
              ${isWaiting
                ? `<button class="expand-btn" type="button" onclick="openReplyModal('${escapeForJs(reply.thread_id)}')">Reply</button>`
                : `<span class="badge green">${escapeHtml(statusLabel)}</span>`}
            </div>
          </article>
        `;
      }).join("");
    }


    function renderEmailCategory(category) {
      const isRenewals = category === "renewals";
      const title = isRenewals ? "Renewals" : (category === "work" ? "Work Email" : "Personal Email");
      const badge = "";
      const note = isRenewals
        ? "Account renewal requests are separated here so Work Email stays focused on regular student/customer replies."
        : (category === "work"
          ? "Only Pharmacy Prep, student, PEBC, course, login, order, renewal, and support related emails are shown here."
          : "Everything actionable that is not Pharmacy Prep related is shown here, including agreements, contracts, documents, finance, and other personal items.");

      setHeader(title, badge, note);
      const list = document.getElementById("mainList");
      const emails = sortNewestFirst(
        state.emails.filter(email => {
          if (isRenewals) return isRenewalEmail(email);
          if (category === "work") return email.category === "work" && !isRenewalEmail(email);
          if (category === "personal") return email.category === "personal" && !isRenewalEmail(email);
          return false;
        }),
        email => email.sort_ts || (email.original && email.original.date) || email.updated_at
      );

      if (!emails.length) {
        const emptyLabel = isRenewals ? "renewal requests" : `${category} emails`;
        list.innerHTML = `<div class="empty">No ${escapeHtml(emptyLabel)} need a response right now. Click <strong>Full Scan</strong> to check Gmail.</div>`;
        return;
      }

      list.innerHTML = emails.map(email => renderEmailCard(email)).join("");
    }

    function renderEmailCard(email) {
      const reply = email.reply;
      const original = email.original || {};
      return `
        <article class="card">
          <div class="card-top">
            <div>
              <h3 class="card-title">${escapeHtml(email.title || "Email")}</h3>
              ${email.important_reason ? `<div class="summary" style="margin-top:12px; margin-bottom:0;">${escapeHtml(email.important_reason)}</div>` : ""}
            </div>
            ${reply ? `<button class="expand-btn" type="button" onclick="openReplyModal('${escapeForJs(reply.thread_id)}')">View</button>` : `<span class="badge green">${escapeHtml(email.status || "Handled")}</span>`}
          </div>
          <div class="meta">
            <strong>From:</strong> ${escapeHtml(original.from || "Unknown sender")}<br>
            <strong>Date:</strong> ${escapeHtml(formatSimpleTime(original.date || "Unknown date"))}<br>
            <strong>Status:</strong> ${escapeHtml(email.status || (reply ? "Needs Reply" : "Handled"))}
          </div>
          <div class="email-pair">
            <div class="email-box">
              <div class="box-title original">Original Email</div>
              <div class="box-body"><div class="compact-line"><strong>Subject:</strong> ${escapeHtml(original.subject || "No subject")}</div>${escapeHtml(cleanEmailFull(original.body || "No original email preview available."))}</div>
            </div>
            <div class="email-box">
              ${reply ? renderReplyPreview(reply) : `<div class="box-title response">Reply</div><div class="box-body">${renderNoReply(email)}</div>`}
            </div>
          </div>

          ${reply ? `
            <div class="card-actions">
              <button class="success" onclick="sendSuggestedReply('${escapeForJs(reply.thread_id)}')">Send Email</button>
            </div>
          ` : ""}
        </article>
      `;
    }

    function renderReplyPreview(reply) {
      return `
        <div class="box-title response">Response</div>
        <div class="box-body reply-preview-clean">${escapeHtml(cleanEmailPreview(reply.body || "No reply preview available."))}</div>
      `;
    }

    function findReplyContext(threadId) {
      for (const order of state.orders) {
        if (order.reply && String(order.reply.thread_id) === String(threadId)) {
          return {
            type: "order",
            title: `Order #${order.order_number || "Unknown"}`,
            original: order.original || {},
            reply: order.reply
          };
        }
      }

      for (const email of state.emails) {
        if (email.reply && String(email.reply.thread_id) === String(threadId)) {
          return {
            type: email.category || "email",
            title: email.title || "Email reply",
            original: email.original || {},
            reply: email.reply
          };
        }
      }

      return null;
    }

    function openReplyModal(threadId) {
      const context = findReplyContext(threadId);
      if (!context || !context.reply) {
        showToast("Could not open this reply. Refresh and try again.");
        return;
      }

      state.currentModalThreadId = String(threadId);
      const original = context.original || {};
      const reply = context.reply || {};

      document.getElementById("modalTitle").textContent = context.title;
      document.getElementById("modalSubtitle").textContent = context.type === "order"
        ? "Review the order email and adjust the customer message before sending."
        : "Review the original email and adjust the response before sending.";
      document.getElementById("modalOriginal").textContent = `From: ${original.from || "Unknown sender"}\nDate: ${formatSimpleTime(original.date || "Unknown date")}\nSubject: ${original.subject || "No subject"}\n\n${cleanEmailFull(original.body || "No original body preview available.")}`;
      const toBox = document.getElementById("modalTo");
      if (toBox) toBox.value = reply.to || "";
      document.getElementById("modalSubject").value = reply.subject || "Reply";
      populateTemplateDropdown();
      const templateSelect = document.getElementById("modalTemplateSelect");
      if (templateSelect) templateSelect.value = "";
      const bodyBox = document.getElementById("modalBody");
      bodyBox.innerText = reply.body || "";

      document.getElementById("modalSendBtn").onclick = () => sendSuggestedReply(threadId);
      document.getElementById("replyModal").classList.add("open");
      bodyBox.focus();
    }

    function closeReplyModal() {
      document.getElementById("replyModal").classList.remove("open");
      state.currentModalThreadId = "";
    }

    function closeReplyModalFromBackdrop(event) {
      if (event.target && event.target.id === "replyModal") closeReplyModal();
    }

    function renderNoReply(email) {
      if (email.reply_sent_at) return `Reply sent on ${formatDate(email.reply_sent_at)}.`;
      return "No reply is currently needed for this email.";
    }

    function renderSummary() {
      setHeader("AI Summary", "Daily review", "A clean overview of what the latest scan found.");
      const friendly = state.briefing && !state.briefing.includes("No summary yet")
        ? state.briefing.replaceAll("# Daily Gmail Briefing", "Daily Gmail Briefing")
        : "No summary yet. Click Full Scan to review emails from June 1 onward.";
      document.getElementById("mainList").innerHTML = `<div class="briefing">${escapeHtml(friendly)}</div>`;
    }

    function setHeader(title, badge, note) {
      document.getElementById("sectionTitle").textContent = title;
      document.getElementById("sectionBadge").textContent = badge || "";
      const noteEl = document.getElementById("sectionNote");
      noteEl.textContent = note || "";
      noteEl.style.display = note ? "block" : "none";
    }

    function syncKillSwitchButton() {
      const button = document.getElementById("killSwitchBtn");
      const enabled = state.automationSettings.auto_reply_enabled !== false;
      button.textContent = enabled ? "Auto Reply: On" : "Auto Reply: Off";
      button.classList.toggle("off", !enabled);
      button.title = enabled
        ? "Auto reply sending is allowed. The app still checks for duplicates before sending."
        : "Auto reply sending is blocked. Auto scanning can still keep the dashboard updated.";
    }

    async function toggleAutoReply() {
      const nextValue = !(state.automationSettings.auto_reply_enabled !== false);
      try {
        const data = await api("/api/automation-settings", {
          method: "POST",
          body: JSON.stringify({ auto_reply_enabled: nextValue })
        });
        state.automationSettings = data.settings || state.automationSettings;
        syncKillSwitchButton();
        showToast(nextValue ? "Auto reply is on." : "Auto reply is off. No replies will be sent until it is turned back on.");
      } catch (error) {
        showToast(error.message);
      }
    }

    async function refreshNow() {
      await scanGmail({ silent: false, automatic: false, forceFull: false });
    }

    async function fullScanNow() {
      await scanGmail({ silent: false, automatic: false, forceFull: true });
    }

    function triggerInitialAutoScan() {
      if (state.hasInitialAutoScan || state.automationSettings.auto_scan_enabled === false) return;
      state.hasInitialAutoScan = true;
      setTimeout(() => {
        if (!state.isScanning) scanGmail({ silent: true, automatic: true });
      }, 900);
    }

    function startAutoRefreshLoops() {
      if (!state.dashboardTimer) {
        state.dashboardTimer = setInterval(() => {
          if (!state.isScanning) loadDashboard();
        }, 30000);
      }

      const minutes = Math.max(1, Number(state.automationSettings.auto_scan_minutes || 1));
      const intervalMs = minutes * 60 * 1000;

      if (state.autoScanTimer) clearInterval(state.autoScanTimer);

      if (state.automationSettings.auto_scan_enabled !== false) {
        state.autoScanTimer = setInterval(() => {
          if (!state.isScanning) scanGmail({ silent: true, automatic: true, forceFull: false });
        }, intervalMs);
      }
    }

    async function scanGmail(options = {}) {
      if (state.isScanning) return;
      state.isScanning = true;
      try {
        setLoading(true, options.forceFull ? "Full scanning Gmail from June 1, 2026..." : (options.automatic ? "Auto refreshing Gmail..." : "Refreshing Gmail..."));
        const data = await api("/api/scan", { method: "POST", body: JSON.stringify({ force_full: Boolean(options.forceFull) }) });
        if (!options.silent) {
          showToast(`Scan complete. Prepared ${data.order_replies_waiting || 0} order replies for approval, skipped ${data.failed_orders_skipped || 0} failed orders, and prepared ${data.suggested_replies || 0} suggested replies.`);
        }
        await loadDashboard();
      } catch (error) {
        showToast(error.message);
      } finally {
        state.isScanning = false;
        setLoading(false);
      }
    }

    async function sendSuggestedReply(threadId) {
      const modalOpen = document.getElementById("replyModal").classList.contains("open") && String(state.currentModalThreadId) === String(threadId);
      const context = findReplyContext(threadId);
      const subject = modalOpen
        ? document.getElementById("modalSubject").value
        : (context && context.reply ? context.reply.subject : "Reply");
      const to = modalOpen
        ? (document.getElementById("modalTo") ? document.getElementById("modalTo").value : "")
        : (context && context.reply ? context.reply.to : "");
      const bodyBox = document.getElementById("modalBody");
      const body = modalOpen
        ? (bodyBox.innerText || bodyBox.textContent || "")
        : (context && context.reply ? context.reply.body : "");
      const body_html = modalOpen
        ? (bodyBox.innerHTML || "")
        : "";

      if (state.automationSettings.auto_reply_enabled === false) {
        showToast("Auto reply is off. Turn it on before sending replies.");
        return;
      }

      try {
        setLoading(true, "Sending email...");
        const data = await api(`/api/replies/${threadId}/send`, {
          method: "POST",
          body: JSON.stringify({ to, subject, body, body_html })
        });
        closeReplyModal();
        showToast(data.message || "Email sent successfully.");
        await loadDashboard();
      } catch (error) {
        showToast(error.message);
      } finally {
        setLoading(false);
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) { return escapeHtml(value).replaceAll("`", "&#096;"); }

    function escapeForJs(value) {
      return String(value ?? "")
        .replaceAll("\\", "\\\\")
        .replaceAll("'", "\\'")
        .replaceAll('"', "\\&quot;")
        .replaceAll("\n", " ");
    }


    function normalizeEmailText(value) {
      return String(value ?? "")
        .replace(/\r\n/g, "\n")
        .replace(/\r/g, "\n")
        .replace(/=\n/g, "")
        .replace(/&nbsp;/gi, " ")
        .replace(/<br\s*\/?>/gi, "\n")
        .replace(/<\/p>/gi, "\n")
        .replace(/<[^>]+>/g, "")
        .replace(/[\u00A0\u2000-\u200D\u202F\u2060]/g, " ")
        .replace(/[ \t]+\n/g, "\n")
        .replace(/\n{3,}/g, "\n\n")
        .trim();
    }

    function removeQuotedThread(value) {
      let text = normalizeEmailText(value);

      const quotePatterns = [
        /\n\s*>?\s*On\s+(?:Mon|Tue|Wed|Thu|Fri|Sat|Sun)[\s\S]*?wrote:\s*[\s\S]*$/i,
        /\n\s*>?\s*On\s+.{0,260}?wrote:\s*[\s\S]*$/i,
        /\n\s*-{2,}\s*Original Message\s*-{2,}\s*[\s\S]*$/i,
        /\n\s*From:\s.+\n\s*Sent:\s.+\n\s*To:\s.+\n\s*Subject:\s.+[\s\S]*$/i
      ];

      for (const pattern of quotePatterns) {
        text = text.replace(pattern, "").trim();
      }

      text = text
        .split("\n")
        .filter(line => !/^\s*>/.test(line))
        .join("\n")
        .replace(/\n{3,}/g, "\n\n")
        .trim();

      return text || "No email content available.";
    }

    function cleanEmailPreview(value) {
      return removeQuotedThread(value);
    }

    function cleanEmailFull(value) {
      return normalizeEmailText(value)
        .split("\n")
        .map(line => line.replace(/^\s*>+\s?/, ""))
        .join("\n")
        .replace(/\n{3,}/g, "\n\n")
        .trim();
    }

    function ordinalDay(dayNumber) {
      const suffix = (dayNumber % 10 === 1 && dayNumber % 100 !== 11) ? "st"
        : (dayNumber % 10 === 2 && dayNumber % 100 !== 12) ? "nd"
        : (dayNumber % 10 === 3 && dayNumber % 100 !== 13) ? "rd"
        : "th";
      return `${String(dayNumber).padStart(2, "0")}${suffix}`;
    }

    function formatEmailDateTime(value) {
      if (!value) return "Unknown";

      const parsed = new Date(value);
      if (!Number.isNaN(parsed.getTime())) {
        const month = parsed.toLocaleString("en-US", { month: "long" });
        const day = ordinalDay(parsed.getDate());
        const time = parsed.toLocaleTimeString("en-US", {
          hour: "numeric",
          minute: "2-digit",
          hour12: true
        });
        return `${month} ${day}, ${time}`;
      }

      const raw = String(value);
      const dateMatch = raw.match(/\b(\d{1,2})\s+([A-Za-z]{3,9})\s+\d{4}\b|\b([A-Za-z]{3,9})\s+(\d{1,2}),?\s+\d{4}\b/);
      const timeMatch = raw.match(/\b(\d{1,2}):(\d{2})(?::\d{2})?\b/);

      if (dateMatch && timeMatch) {
        const monthRaw = dateMatch[2] || dateMatch[3];
        const dayRaw = dateMatch[1] || dateMatch[4];
        const monthDate = new Date(`${monthRaw} 1, 2000`);
        const month = Number.isNaN(monthDate.getTime()) ? monthRaw : monthDate.toLocaleString("en-US", { month: "long" });
        let hour = parseInt(timeMatch[1], 10);
        const minute = timeMatch[2];
        const suffix = hour >= 12 ? "PM" : "AM";
        hour = hour % 12 || 12;
        return `${month} ${ordinalDay(parseInt(dayRaw, 10))}, ${hour}:${minute} ${suffix}`;
      }

      return raw;
    }

    function formatSimpleTime(value) {
      return formatEmailDateTime(value);
    }

    function formatDate(value) {
      return formatEmailDateTime(value);
    }



    // Final cleanup: keep renewals out of Work, remove submitted-question notices,
    // and treat anything non-Pharmacy Prep as Personal on the frontend too.
    function isIgnoredQuestionEmail(email) {
      if (!email) return false;
      const original = email.original || {};
      const haystack = [
        email.title || "",
        email.important_reason || "",
        email.status || "",
        original.from || "",
        original.subject || "",
        original.body || ""
      ].join(" ").toLowerCase().replace(/\s+/g, " ");
      return haystack.includes("new question submitted")
        || haystack.includes("new question submited")
        || haystack.includes("new question has been submitted")
        || haystack.includes("new question has been submited")
        || haystack.includes("question submitted")
        || haystack.includes("question submited")
        || haystack.includes("new support question has been submitted at eprepstation.com")
        || (haystack.includes("new support question") && haystack.includes("eprepstation"));
    }

    function isRenewalEmail(email) {
      if (!email) return false;
      const details = email.renewal_details || {};
      const original = email.original || {};
      const haystack = [
        email.category || "",
        email.title || "",
        email.important_reason || "",
        original.subject || "",
        original.body || "",
        details.course || "",
        details.student_email || "",
        details.email || ""
      ].join(" ").toLowerCase();
      return Boolean(email.is_renewal_request || email.renewal_request || email.category === "renewal" || haystack.includes("account renewal request"));
    }

    function isPharmacyPrepEmail(email) {
      if (!email || isIgnoredQuestionEmail(email) || isRenewalEmail(email)) return false;
      const original = email.original || {};
      const from = (original.from || "").toLowerCase();
      const text = [
        email.title || "",
        original.subject || "",
        original.body || "",
        original.from || ""
      ].join(" ").toLowerCase().replace(/\s+/g, " ");

      const personalDocTerms = [
        "lease agreement", "rental agreement", "tenancy agreement", "lease copy", "agreement copy",
        "contract", "agreement", "landlord", "tenant", "rent", "mortgage", "bank statement",
        "insurance", "policy document", "legal document", "docusign", "adobe sign", "signed document"
      ];
      const coreWorkTerms = [
        "pharmacy prep", "pharmacyprep", "eprepstation", "eprep station", "www.pharmacyprep.com",
        "pebc", "evaluating exam", "qualifying exam", "osce", "ospe", "fpgee", "opra", "naplex",
        "qbank", "question bank", "mock exam", "pharmacist qualifying", "pharmacy technician",
        "prep course", "account renewal request", "course renewal"
      ];
      if (coreWorkTerms.some(term => text.includes(term))) return true;
      if (from.includes("pharmacyprep.com") || from.includes("eprepstation.com")) return true;
      if (personalDocTerms.some(term => text.includes(term))) return false;

      const studentContext = ["student", "students", "enrolled", "enrollment", "registration"].some(term => text.includes(term));
      const courseContext = ["course", "class", "lecture", "recording", "notes", "book", "login", "access", "password", "renewal", "extension"].some(term => text.includes(term));
      const examContext = ["exam", "mcq", "osce", "ospe", "qbank", "mock", "pebc", "evaluating", "qualifying"].some(term => text.includes(term));
      return (studentContext && (courseContext || examContext)) || (courseContext && examContext);
    }

    function visibleEmailPool() {
      return (state.emails || []).filter(email => !isIgnoredQuestionEmail(email));
    }

    function updateStats() {
      const pool = visibleEmailPool();
      const ordersHandled = state.orders.filter(order => !order.reply).length;
      const renewalEmails = pool.filter(isRenewalEmail).length;
      const workEmails = pool.filter(email => !isRenewalEmail(email) && isPharmacyPrepEmail(email)).length;
      const personalEmails = pool.filter(email => !isRenewalEmail(email) && !isPharmacyPrepEmail(email)).length;
      const pendingReplies = (state.pendingReplies.length || state.orders.filter(order => order.reply).length + pool.filter(email => email.reply).length);

      document.getElementById("ordersReplied").textContent = ordersHandled;
      document.getElementById("pendingReplies").textContent = pendingReplies;
      document.getElementById("workEmails").textContent = workEmails;
      document.getElementById("personalEmails").textContent = personalEmails;

      document.getElementById("pill-orders").textContent = state.orders.length || 0;
      document.getElementById("pill-work").textContent = workEmails;
      const renewalPill = document.getElementById("pill-renewals");
      if (renewalPill) renewalPill.textContent = renewalEmails;
      document.getElementById("pill-personal").textContent = personalEmails;
    }

    function renderEmailCategory(category) {
      const isRenewals = category === "renewals";
      const title = isRenewals ? "Renewals" : (category === "work" ? "Work Email" : "Personal Email");
      const badge = "";
      const note = isRenewals
        ? "Account renewal requests are separated here so Work Email stays focused on regular student/customer replies."
        : (category === "work"
          ? "Only Pharmacy Prep, PEBC, EprepStation, student/course/exam/login/order/support emails are shown here."
          : "Everything actionable that is not Pharmacy Prep related is shown here, including agreements, contracts, leases, documents, finance, and other personal items.");

      setHeader(title, badge, note);
      const list = document.getElementById("mainList");
      const emails = sortNewestFirst(
        visibleEmailPool().filter(email => {
          if (isRenewals) return isRenewalEmail(email);
          if (category === "work") return !isRenewalEmail(email) && isPharmacyPrepEmail(email);
          if (category === "personal") return !isRenewalEmail(email) && !isPharmacyPrepEmail(email);
          return false;
        }),
        email => email.sort_ts || (email.original && email.original.date) || email.updated_at
      );

      if (!emails.length) {
        const emptyLabel = isRenewals ? "renewal requests" : `${category} emails`;
        list.innerHTML = `<div class="empty">No ${escapeHtml(emptyLabel)} need a response right now. Click <strong>Full Scan</strong> to check Gmail.</div>`;
        return;
      }

      list.innerHTML = emails.map(email => renderEmailCard(email)).join("");
    }




    // Final cleanup: hide GetSmarter/course promos, decode zwnj garbage, and render
    // connected thread/forwarded-message cards both on the dashboard and in View.
    function decodeHtmlEntitiesFinal(value) {
      const el = document.createElement("textarea");
      el.innerHTML = String(value ?? "");
      return el.value;
    }

    function normalizeEmailText(value) {
      return decodeHtmlEntitiesFinal(String(value ?? ""))
        .replace(/&zwnj;|&#8204;|&#x200c;/gi, "")
        .replace(/[\u200B-\u200D\uFEFF]/g, "")
        .replace(/\r\n/g, "\n")
        .replace(/\r/g, "\n")
        .replace(/=\n/g, "")
        .replace(/&nbsp;/gi, " ")
        .replace(/<br\s*\/?>/gi, "\n")
        .replace(/<\/p>/gi, "\n")
        .replace(/<[^>]+>/g, "")
        .replace(/[\u00A0\u2000-\u200D\u202F\u2060]/g, " ")
        .replace(/[ \t]+\n/g, "\n")
        .replace(/\n{4,}/g, "\n\n\n")
        .trim();
    }

    function isPromotionalNoiseEmail(email) {
      if (!email || isRenewalEmail(email)) return false;
      const original = email.original || {};
      const haystack = [
        email.category || "", email.title || "", email.important_reason || "", email.status || "",
        original.from || "", original.subject || "", original.body || ""
      ].join(" ").toLowerCase().replace(/\s+/g, " ");
      const hardTerms = [
        "getsmarter", "mitsloan@getsmarter.com", "mit sloan course team", "your moment to get ahead",
        "now is your moment", "course team at getsmarter", "online short course", "short course",
        "xbox", "game pass", "vimeo", "mail.vimeo", "email.vimeo", "jp morgan", "jpmorgan",
        "j.p. morgan", "chase", "market update", "market insights", "wealth management",
        "newsletter", "unsubscribe", "promotion", "promotional", "limited time", "special offer",
        "exclusive offer", "discount", "coupon", "recommended for you", "watch now", "stream now",
        "webinar", "register today", "join us for", "creator update", "gaming", "sponsored"
      ];
      return hardTerms.some(term => haystack.includes(term));
    }

    function visibleEmailPool() {
      return (state.emails || []).filter(email => !isIgnoredQuestionEmail(email) && !isPromotionalNoiseEmail(email));
    }

    function isPharmacyPrepEmail(email) {
      if (!email || isIgnoredQuestionEmail(email) || isRenewalEmail(email) || isPromotionalNoiseEmail(email)) return false;
      const original = email.original || {};
      const from = (original.from || "").toLowerCase();
      const text = [
        email.title || "", email.important_reason || "", original.subject || "", original.body || "", original.from || ""
      ].join(" ").toLowerCase().replace(/\s+/g, " ");

      const personalTerms = [
        "lease", "lease agreement", "rental agreement", "tenancy", "landlord", "tenant", "rent",
        "century21", "century 21", "c21.", "agreement copy", "copy of agreement", "contract",
        "legal document", "lawyer", "attorney", "docusign", "adobe sign", "signed document",
        "signature request", "bank statement", "insurance", "policy document", "mortgage", "cra", "tax",
        "appointment", "medical", "doctor", "clinic"
      ];
      const coreWork = [
        "pharmacy prep", "pharmacyprep", "eprepstation", "eprep station", "www.pharmacyprep.com",
        "pebc", "evaluating exam", "qualifying exam", "osce", "ospe", "fpgee", "opra", "naplex",
        "qbank", "question bank", "mock exam", "mock exams", "pharmacist qualifying", "pharmacy technician",
        "prep course", "account renewal request", "course renewal", "home study plus online"
      ];
      if (from.includes("support@pharrmacyprep.com")) return false;
      if (coreWork.some(term => text.includes(term))) return true;
      if (from.includes("pharmacyprep.com") || from.includes("eprepstation.com")) return true;
      if (personalTerms.some(term => text.includes(term))) return false;

      const studentContext = ["student", "students", "enrolled", "enrollment", "enrolment", "registered", "registration", "customer"].some(term => text.includes(term));
      const courseContext = ["course", "class", "lecture", "recording", "notes", "book", "login", "access", "password", "renewal", "extension", "materials"].some(term => text.includes(term));
      const examContext = ["pebc", "exam", "mcq", "osce", "ospe", "qbank", "mock", "evaluating", "qualifying", "pharmacist", "pharmacy technician"].some(term => text.includes(term));
      const orderContext = ["order number", "order #", "invoice", "receipt", "payment", "refund", "e-transfer", "etransfer"].some(term => text.includes(term));
      return (studentContext && (courseContext || examContext || orderContext)) || (courseContext && examContext);
    }

    function findReplyContext(threadId) {
      for (const order of state.orders) {
        if (order.reply && String(order.reply.thread_id) === String(threadId)) {
          return { type: "order", title: `Order #${order.order_number || "Unknown"}`, original: order.original || {}, reply: order.reply, item: order };
        }
      }
      for (const email of state.emails) {
        if (email.reply && String(email.reply.thread_id) === String(threadId)) {
          return { type: email.category || "email", title: email.title || "Email reply", original: email.original || {}, reply: email.reply, item: email };
        }
      }
      return null;
    }

    function parseForwardedChunk(raw, fallbackIndex) {
      const text = cleanEmailFull(raw || "");
      const lines = text.split("\n");
      const meta = { from: "", to: "", date: "", subject: "" };
      let bodyStart = 0;
      for (let i = 0; i < Math.min(lines.length, 10); i++) {
        const line = lines[i].trim();
        const match = line.match(/^(From|To|Sent|Date|Subject):\s*(.*)$/i);
        if (match) {
          const key = match[1].toLowerCase() === "sent" ? "date" : match[1].toLowerCase();
          meta[key] = match[2].trim();
          bodyStart = i + 1;
        } else if (line && bodyStart) {
          break;
        }
      }
      return {
        label: `Forwarded message ${fallbackIndex}`,
        direction: "Forwarded",
        from: meta.from,
        to: meta.to,
        date: meta.date,
        subject: meta.subject,
        body: lines.slice(bodyStart).join("\n").trim() || text,
        forwarded: true
      };
    }

    function expandForwardedMessages(message) {
      const body = cleanEmailFull(message.body || "");
      const normalized = body.replace(/-{2,}\s*Forwarded Message\s*-{2,}/gi, "\n[[FORWARDED_MESSAGE]]\n");
      let parts = normalized.split("[[FORWARDED_MESSAGE]]").map(p => p.trim()).filter(Boolean);
      if (parts.length <= 1) {
        const fromSentIndex = body.search(/\n\s*From:\s.+\n\s*(Sent|Date):\s/i);
        if (fromSentIndex > 40) {
          parts = [body.slice(0, fromSentIndex).trim(), body.slice(fromSentIndex).trim()].filter(Boolean);
        }
      }
      if (parts.length <= 1) return [{ ...message, body }];
      const output = [];
      if (parts[0]) output.push({ ...message, body: parts[0] });
      for (let i = 1; i < parts.length; i++) output.push(parseForwardedChunk(parts[i], i));
      return output;
    }

    function timelineMessagesForItem(item) {
      const original = item.original || {};
      const rawHistory = Array.isArray(item.thread_history) ? item.thread_history : (Array.isArray(item.thread_messages) ? item.thread_messages : []);
      let messages = rawHistory.length ? rawHistory.map((msg, idx) => ({
        label: msg.label || `Email ${idx + 1} of ${rawHistory.length}`,
        direction: msg.direction || "Email",
        from: msg.from || "",
        to: msg.to || "",
        date: msg.date || "",
        subject: msg.subject || original.subject || "No subject",
        body: msg.body || ""
      })) : [{
        label: "Latest email",
        direction: "Received",
        from: original.from || "Unknown sender",
        to: original.to || "",
        date: original.date || "",
        subject: original.subject || "No subject",
        body: original.body || "No email content available."
      }];
      const expanded = [];
      for (const msg of messages) expanded.push(...expandForwardedMessages(msg));
      return expanded.filter(msg => cleanEmailFull(msg.body || "").trim() || msg.subject || msg.from);
    }

    function renderThreadTimeline(item, compact = false) {
      const messages = timelineMessagesForItem(item);
      if (!messages.length) return `<div class="empty">No email content available.</div>`;
      return `<div class="thread-timeline">${messages.map((msg, index) => {
        const label = msg.label || `Email ${index + 1} of ${messages.length}`;
        const direction = msg.direction || (msg.forwarded ? "Forwarded" : "Email");
        const body = cleanEmailFull(msg.body || "No body available.");
        return `
          <div class="thread-node">
            <div class="thread-dot"></div>
            <div class="thread-card-ui">
              <div class="thread-card-head">
                <div><div class="thread-card-title">${escapeHtml(label)}</div><div>${escapeHtml(direction)}</div></div>
                <div class="thread-card-date">${escapeHtml(formatSimpleTime(msg.date || ""))}</div>
              </div>
              ${msg.forwarded ? `<div class="forward-chip">Forwarded message</div>` : ""}
              <div class="thread-card-meta"><strong>From:</strong> ${escapeHtml(msg.from || "Unknown sender")}${msg.to ? `<br><strong>To:</strong> ${escapeHtml(msg.to)}` : ""}</div>
              <div class="thread-card-subject">Subject: ${escapeHtml(msg.subject || "No subject")}</div>
              <div class="thread-card-body ${compact ? "compact" : ""}">${escapeHtml(body)}</div>
            </div>
          </div>`;
      }).join("")}</div>`;
    }

    function renderEmailCard(email) {
      const reply = email.reply;
      const original = email.original || {};
      return `
        <article class="card">
          <div class="card-top">
            <div>
              <h3 class="card-title">${escapeHtml(email.title || "Email")}</h3>
              ${email.important_reason ? `<div class="summary" style="margin-top:12px; margin-bottom:0;">${escapeHtml(email.important_reason)}</div>` : ""}
            </div>
            ${reply ? `<button class="expand-btn" type="button" onclick="openReplyModal('${escapeForJs(reply.thread_id)}')">View</button>` : `<span class="badge green">${escapeHtml(email.status || "Handled")}</span>`}
          </div>
          <div class="meta">
            <strong>From:</strong> ${escapeHtml(original.from || "Unknown sender")}<br>
            <strong>Date:</strong> ${escapeHtml(formatSimpleTime(original.date || "Unknown date"))}<br>
            <strong>Status:</strong> ${escapeHtml(email.status || (reply ? "Needs Reply" : "Handled"))}
          </div>
          <div class="email-pair">
            <div class="email-box">
              <div class="box-title original">Thread History</div>
              <div class="box-body thread-box-body">${renderThreadTimeline(email, true)}</div>
            </div>
            <div class="email-box">
              ${reply ? renderReplyPreview(reply) : `<div class="box-title response">Reply</div><div class="box-body">${renderNoReply(email)}</div>`}
            </div>
          </div>
          ${reply ? `<div class="card-actions"><button class="success" onclick="sendSuggestedReply('${escapeForJs(reply.thread_id)}')">Send Email</button></div>` : ""}
        </article>`;
    }

    function renderReplyPreview(reply) {
      return `<div class="box-title response">Response</div><div class="box-body reply-preview-clean">${escapeHtml(cleanEmailPreview(reply.body || "No reply preview available."))}</div>`;
    }

    async function openReplyModal(threadId) {
      const context = findReplyContext(threadId);
      if (!context || !context.reply) {
        showToast("Could not open this reply. Refresh and try again.");
        return;
      }
      state.currentModalThreadId = String(threadId);
      const reply = context.reply || {};
      const modalOriginal = document.getElementById("modalOriginal");
      document.getElementById("modalTitle").textContent = context.title;
      document.getElementById("modalSubtitle").textContent = context.type === "order"
        ? "Review the order email and adjust the customer message before sending."
        : "Review the full thread history and adjust the response before sending.";
      modalOriginal.innerHTML = renderThreadTimeline(context.item || { original: context.original || {} }, false);
      const toBox = document.getElementById("modalTo");
      if (toBox) toBox.value = reply.to || "";
      document.getElementById("modalSubject").value = reply.subject || "Reply";
      populateTemplateDropdown();
      const templateSelect = document.getElementById("modalTemplateSelect");
      if (templateSelect) templateSelect.value = "";
      const bodyBox = document.getElementById("modalBody");
      bodyBox.innerText = cleanEmailPreview(reply.body || "");
      document.getElementById("modalSendBtn").onclick = () => sendSuggestedReply(threadId);
      document.getElementById("replyModal").classList.add("open");
      bodyBox.focus();

      try {
        const data = await api(`/api/threads/${threadId}/history`);
        if (data && Array.isArray(data.thread_history) && data.thread_history.length) {
          const refreshed = { ...(context.item || {}), original: context.original || {}, thread_history: data.thread_history };
          modalOriginal.innerHTML = renderThreadTimeline(refreshed, false);
        }
      } catch (error) {
        // Keep the saved thread preview if live Gmail history is unavailable.
      }
    }


    loadDashboard();
  </script>
