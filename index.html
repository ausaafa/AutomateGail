<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>success@pharmacyprep.com</title>

  <style>
    :root {
      --bg: #f4f5f7;
      --panel: #ffffff;
      --text: #070707;
      --muted: #343434;
      --line: #d0d5dd;
      --soft: #f7f7f7;
      --black: #050505;
      --black-soft: #f1f1f1;
      --blue: #050505;
      --blue-soft: #f1f1f1;
      --green: #050505;
      --green-soft: #f1f1f1;
      --red: #b42318;
      --red-soft: #fff5f5;
      --amber: #92400e;
      --amber-soft: #fffbeb;
      --purple: #050505;
      --purple-soft: #f1f1f1;
      --shadow: 0 12px 28px rgba(16, 24, 40, 0.10);
      --radius: 6px;
      --page-gutter: 20px;
    }

    * { box-sizing: border-box; }

    html,
    body {
      height: 100%;
    }

    html {
      overflow: hidden;
      scrollbar-gutter: stable both-edges;
    }

    body {
      margin: 0;
      width: 100%;
      min-width: 0;
      min-height: 100vh;
      overflow: hidden;
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      font-size: 16px;
    }

    .shell {
      width: 100vw;
      max-width: none;
      min-width: 0;
      height: 100dvh;
      margin: 0;
      padding: var(--page-gutter);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 14px;
      overflow: hidden;
    }

    .topbar {
      min-width: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 0;
      flex: 0 0 auto;
    }

    .brand {
      display: flex;
      align-items: center;
      min-width: 0;
      max-width: 100%;
    }

    .logo,
    .brand h1 {
      display: none;
    }

    .connected {
      color: var(--black);
      font-size: clamp(20px, 1.65vw, 30px);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.035em;
      word-break: break-word;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
      flex: 0 0 auto;
    }

    button {
      border: 0;
      cursor: pointer;
      border-radius: 4px;
      padding: 12px 16px;
      min-height: 44px;
      font-size: 14px;
      font-weight: 900;
      transition: transform .12s ease, opacity .12s ease, background .12s ease;
      white-space: nowrap;
    }

    .actions button {
      min-width: 124px;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: .55; cursor: not-allowed; transform: none; }

    .primary { background: var(--black); color: white; }
    .secondary { background: white; border: 1px solid var(--black); color: var(--black); }
    .success { background: var(--black); color: white; }
    .danger { background: var(--red-soft); color: var(--red); border: 1px solid #fecdd3; }

    .kill-switch {
      border: 1px solid var(--black);
      background: var(--black);
      color: #ffffff;
      font-weight: 900;
    }

    .kill-switch.off {
      background: var(--red-soft);
      color: var(--red);
      border-color: #fda4af;
    }

    .panel {
      min-width: 0;
      background: rgba(255,255,255,.96);
      border: 1px solid rgba(255,255,255,.95);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 18px;
    }

    .hidden-status {
      display: none;
    }

    .loader {
      display: none;
      gap: 9px;
      align-items: center;
      color: var(--muted);
      font-weight: 850;
      margin-top: 10px;
    }

    .spinner {
      width: 17px;
      height: 17px;
      border: 3px solid #e5e7eb;
      border-top-color: var(--black);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .workspace {
      width: 100%;
      display: grid;
      grid-template-columns: 235px minmax(0, 1fr);
      gap: 14px;
      align-items: stretch;
      min-height: 0;
      min-width: 0;
      height: 100%;
      overflow: hidden;
    }

    .left-rail {
      min-width: 0;
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 14px;
      overflow: hidden;
      padding-right: 2px;
    }

    .sidebar {
      display: grid;
      gap: 10px;
      padding: 12px;
    }

    .stats {
      min-height: 0;
      height: 100%;
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: repeat(4, minmax(0, 1fr));
      gap: 10px;
      padding: 12px;
      overflow: hidden;
    }

    .stat {
      min-height: 0;
      border-radius: 6px;
      background: white;
      border: 1px solid var(--line);
      padding: 15px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .stat-number {
      font-size: 29px;
      letter-spacing: -0.05em;
      font-weight: 950;
      line-height: 1;
    }

    .stat-label {
      color: var(--muted);
      font-weight: 850;
      margin-top: 6px;
      font-size: 13px;
    }

    .nav-btn {
      width: 100%;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-radius: 5px;
      padding: 15px;
      background: white;
      border: 1px solid var(--line);
      color: var(--text);
    }

    .nav-btn.active {
      background: var(--black-soft);
      border-color: var(--black);
      color: var(--black);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 30px;
      height: 26px;
      padding: 0 9px;
      border-radius: 5px;
      background: #ededed;
      color: #344054;
      font-size: 13px;
      font-weight: 950;
    }

    .nav-btn.active .pill { background: var(--black); color: white; }

    .main-panel {
      width: 100%;
      min-width: 0;
      height: 100%;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
    }

    .section-head h2 {
      margin: 0;
      font-size: 30px;
      letter-spacing: -0.05em;
    }

    .section-note {
      color: var(--muted);
      font-weight: 750;
      line-height: 1.55;
      margin: 0 0 14px;
      flex: 0 0 auto;
    }

    .list {
      flex: 1 1 auto;
      min-height: 0;
      min-width: 0;
      display: grid;
      align-content: start;
      gap: 14px;
      overflow-y: auto;
      overscroll-behavior: contain;
      scrollbar-gutter: stable both-edges;
      padding: 2px 6px 4px 2px;
    }

    .list,
    .left-rail,
    .box-body,
    .reply-preview,
    .modal-email-body,
    .modal-grid {
      scrollbar-width: auto;
      scrollbar-color: #050505 #e5e7eb;
    }

    .list::-webkit-scrollbar,
    .left-rail::-webkit-scrollbar,
    .box-body::-webkit-scrollbar,
    .reply-preview::-webkit-scrollbar,
    .modal-email-body::-webkit-scrollbar,
    .modal-grid::-webkit-scrollbar {
      width: 16px;
      height: 16px;
    }

    .list::-webkit-scrollbar-track,
    .left-rail::-webkit-scrollbar-track,
    .box-body::-webkit-scrollbar-track,
    .reply-preview::-webkit-scrollbar-track,
    .modal-email-body::-webkit-scrollbar-track,
    .modal-grid::-webkit-scrollbar-track {
      background: #e5e7eb;
      border-radius: 999px;
    }

    .list::-webkit-scrollbar-thumb,
    .left-rail::-webkit-scrollbar-thumb,
    .box-body::-webkit-scrollbar-thumb,
    .reply-preview::-webkit-scrollbar-thumb,
    .modal-email-body::-webkit-scrollbar-thumb,
    .modal-grid::-webkit-scrollbar-thumb {
      background: #050505;
      border-radius: 999px;
      border: 3px solid #e5e7eb;
    }

    .card {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: white;
      padding: 16px;
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .card-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.22;
      letter-spacing: -0.035em;
      font-weight: 950;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 5px;
      padding: 7px 10px;
      font-size: 12px;
      font-weight: 950;
      white-space: nowrap;
      background: #f2f4f7;
      color: #344054;
      border: 1px solid #e4e7ec;
    }

    .badge.green { background: var(--green-soft); color: var(--green); border-color: #abefc6; }
    .badge.blue { background: var(--black-soft); color: var(--black); border-color: var(--black); }
    .badge.purple { background: var(--purple-soft); color: var(--purple); border-color: #d9d6fe; }
    .badge.red { background: var(--red-soft); color: var(--red); border-color: #fecdd3; }

    #sectionBadge { display: none; }

    .meta {
      color: #242424;
      line-height: 1.5;
      font-size: 15px;
      font-weight: 800;
      word-break: break-word;
      margin-bottom: 12px;
    }

    .summary {
      padding: 14px;
      border-radius: 10px;
      background: #f8fafc;
      border: 1px solid var(--line);
      font-weight: 750;
      line-height: 1.55;
      color: #111111;
      margin-bottom: 13px;
    }

    .email-pair {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 13px;
      margin-top: 12px;
    }

    .email-box {
      border-radius: 6px;
      border: 1px solid var(--line);
      overflow: hidden;
      background: #fcfcfd;
      min-width: 0;
    }

    .box-title {
      padding: 12px 14px;
      background: #f9fafb;
      border-bottom: 1px solid var(--line);
      font-weight: 950;
      font-size: 14px;
    }

    .box-title.response { color: var(--black); }
    .box-title.original { color: #344054; }

    .box-body {
      padding: 18px;
      max-height: 340px;
      min-height: 260px;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-gutter: stable;
      white-space: pre-wrap;
      color: #000000;
      font-size: 19px;
      line-height: 1.65;
      font-weight: 750;
    }

    .compact-line { margin-bottom: 12px; color: #344054; }

    .reply-subject {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 12px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 10px;
      outline: none;
    }

    .reply-body {
      width: 100%;
      min-height: 190px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 12px;
      font: inherit;
      font-size: 14px;
      line-height: 1.55;
      outline: none;
    }



    .reply-preview {
      color: #000000;
      line-height: 1.65;
      font-size: 19px;
      font-weight: 750;
      white-space: pre-wrap;
      max-height: 340px;
      min-height: 260px;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-gutter: stable;
      padding-right: 0;
    }

    .reply-edit-wrap {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .reply-edit-wrap.open {
      display: block;
    }

    .expand-btn {
      background: var(--black);
      color: white;
      border: 1px solid var(--black);
      padding: 12px 20px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 950;
      min-width: 82px;
    }

    .response-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      background: #f9fafb;
      border-bottom: 1px solid var(--line);
      font-weight: 950;
      font-size: 14px;
      color: var(--black);
    }

    .card-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-top: 13px;
    }

    .briefing {
      white-space: pre-wrap;
      line-height: 1.7;
      color: #344054;
      font-weight: 650;
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 17px;
    }

    .empty {
      padding: 18px;
      border-radius: 6px;
      border: 1px dashed #98a2b3;
      background: #f8fafc;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.6;
    }

    .toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      display: none;
      max-width: 480px;
      background: #101828;
      color: white;
      padding: 15px 17px;
      border-radius: 6px;
      box-shadow: var(--shadow);
      font-weight: 750;
      line-height: 1.45;
      z-index: 99;
    }



    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(15, 23, 42, .48);
      backdrop-filter: blur(5px);
      z-index: 120;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      width: min(1260px, 96vw);
      max-height: 92vh;
      background: white;
      border-radius: 8px;
      box-shadow: 0 24px 70px rgba(15, 23, 42, .32);
      border: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      padding: 22px 24px;
      border-bottom: 1px solid var(--line);
      background: #fbfcff;
    }

    .modal-title {
      margin: 0;
      font-size: 27px;
      line-height: 1.18;
      letter-spacing: -0.045em;
    }

    .modal-subtitle {
      margin-top: 7px;
      color: var(--muted);
      font-weight: 750;
      line-height: 1.5;
    }

    .modal-close {
      background: white;
      border: 1px solid var(--line);
      color: #344054;
      border-radius: 4px;
      padding: 10px 13px;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: .95fr 1.05fr;
      gap: 18px;
      padding: 20px 24px;
      min-height: 0;
      overflow: auto;
    }

    .modal-section {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: #fcfcfd;
    }

    .modal-section-title {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: #f9fafb;
      font-weight: 950;
    }

    .modal-email-body {
      padding: 18px;
      white-space: pre-wrap;
      color: #000000;
      font-size: 18px;
      line-height: 1.6;
      font-weight: 700;
      max-height: 58vh;
      overflow: auto;
    }

    .modal-form {
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .modal-label {
      color: #344054;
      font-weight: 950;
      font-size: 13px;
      margin-bottom: -5px;
    }

    .modal-to {
      padding: 12px 13px;
      background: #f8fafc;
      border: 1px solid var(--line);
      border-radius: 4px;
      color: #050505;
      font-size: 15px;
      font-weight: 700;
      word-break: break-word;
    }

    .modal-input,
    .modal-textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 13px;
      font: inherit;
      font-size: 16px;
      outline: none;
      background: white;
    }

    .modal-input:focus,
    .modal-textarea:focus {
      border-color: var(--black);
      box-shadow: 0 0 0 3px rgba(5, 5, 5, .10);
    }

    .modal-textarea {
      min-height: 340px;
      resize: vertical;
      line-height: 1.65;
    }


    .template-select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 13px;
      font: inherit;
      font-size: 16px;
      outline: none;
      background: white;
      min-height: 48px;
      font-weight: 800;
    }

    .template-select:focus {
      border-color: var(--black);
      box-shadow: 0 0 0 3px rgba(5, 5, 5, .10);
    }

    .favorite-btn {
      background: white;
      color: #050505;
      border: 1px solid var(--black);
      min-width: 96px;
    }

    .favorite-btn.active {
      background: #050505;
      color: white;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      padding: 16px 24px;
      border-top: 1px solid var(--line);
      background: #fbfcff;
    }


    /* Final UI tightening: sharper corners, stronger black text, no blue action buttons. */
    .panel, .card, .email-box, .summary, .briefing, .empty, .modal-section, .toast { border-radius: 6px; }
    button, .nav-btn, .reply-subject, .reply-body, .modal-input, .modal-textarea, .modal-to, .modal-close, .expand-btn { border-radius: 4px; }
    .primary, .success, .expand-btn { background: #050505; border-color: #050505; color: #ffffff; }
    .primary:hover, .success:hover, .expand-btn:hover { background: #1a1a1a; }
    .secondary { border-color: #050505; color: #050505; }
    .box-body, .reply-preview, .reply-preview-clean, .modal-email-body, .modal-textarea { color: #000000; font-size: 19px; line-height: 1.65; font-weight: 750; }
    .box-body.reply-preview-clean { min-height: 260px; }
    .summary, .briefing, .section-note, .meta, .connected, .stat-label { color: #111111; }
    .box-title.response, .response-head { color: #050505; }

    @media (max-width: 1120px) {
      html, body { overflow-y: auto; overflow-x: hidden; }
      .shell {
        width: 100vw;
        max-width: none;
        height: auto;
        min-height: 100dvh;
        margin: 0;
        padding: var(--page-gutter);
        display: flex;
        flex-direction: column;
        overflow: visible;
      }
      .workspace {
        height: auto;
        grid-template-columns: 1fr;
        overflow: visible;
      }
      .left-rail {
        height: auto;
        overflow: visible;
      }
      .sidebar { grid-template-columns: repeat(4, 1fr); }
      .stats {
        height: auto;
        grid-template-columns: repeat(4, 1fr);
        grid-template-rows: none;
        overflow: visible;
      }
      .main-panel {
        height: min(680px, calc(100dvh - 40px));
      }
      .email-pair { grid-template-columns: 1fr; }
      .modal-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 760px) {
      :root { --page-gutter: 12px; }
      .shell { width: 100vw; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .actions { width: 100%; display: grid; grid-template-columns: 1fr; }
      button { width: 100%; }
      .sidebar { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr; }
      .section-head { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>

<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="connected" id="connectedEmail">success@pharmacyprep.com</div>
      </div>

      <div class="actions">
        <button class="kill-switch" onclick="toggleAutoReply()" id="killSwitchBtn">Auto Reply: On</button>
        <button class="primary" onclick="scanGmail()" id="scanBtn">Scan Gmail</button>
        <button class="secondary" onclick="refreshNow()">Refresh</button>
      </div>
    </header>

    <section class="workspace">
      <div class="left-rail">
        <nav class="panel sidebar">
          <button class="nav-btn" onclick="setSection('orders')" id="nav-orders">Orders <span class="pill" id="pill-orders">0</span></button>
          <button class="nav-btn active" onclick="setSection('work')" id="nav-work">Work Email <span class="pill" id="pill-work">0</span></button>
          <button class="nav-btn" onclick="setSection('personal')" id="nav-personal">Personal Email <span class="pill" id="pill-personal">0</span></button>
          <button class="nav-btn" onclick="setSection('summary')" id="nav-summary">AI Summary <span class="pill">Today</span></button>
        </nav>

        <section class="panel stats" aria-label="Email review totals">
          <div class="stat">
            <div class="stat-number" id="ordersReplied">0</div>
            <div class="stat-label">Orders Sent</div>
          </div>
          <div class="stat">
            <div class="stat-number" id="pendingReplies">0</div>
            <div class="stat-label">Replies Waiting</div>
          </div>
          <div class="stat">
            <div class="stat-number" id="workEmails">0</div>
            <div class="stat-label">Work Emails</div>
          </div>
          <div class="stat">
            <div class="stat-number" id="personalEmails">0</div>
            <div class="stat-label">Personal Emails</div>
          </div>
        </section>
      </div>

      <main class="panel main-panel">
        <div class="section-head">
          <h2 id="sectionTitle">Work Email</h2>
          <span class="badge blue" id="sectionBadge">Needs response</span>
        </div>
        <p class="section-note" id="sectionNote"></p>
        <div class="list" id="mainList"></div>
      </main>
    </section>
  </div>

  <div class="hidden-status" aria-hidden="true">
    <div id="statusText">Ready</div>
    <div class="loader" id="loadingBox"><div class="spinner"></div><span>Working...</span></div>
  </div>



  <div class="modal-backdrop" id="replyModal" onclick="closeReplyModalFromBackdrop(event)">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <div>
          <h2 class="modal-title" id="modalTitle">Review reply</h2>
          <div class="modal-subtitle" id="modalSubtitle">View the original email and edit the response before sending.</div>
        </div>
        <button class="modal-close" type="button" onclick="closeReplyModal()">Close</button>
      </div>

      <div class="modal-grid">
        <section class="modal-section">
          <div class="modal-section-title">Original Email</div>
          <div class="modal-email-body" id="modalOriginal"></div>
        </section>

        <section class="modal-section">
          <div class="modal-section-title">Response</div>
          <div class="modal-form">
            <div class="modal-label">To</div>
            <div class="modal-to" id="modalTo"></div>
            <div class="modal-label">Subject</div>
            <input class="modal-input" id="modalSubject" />
            <div class="modal-label">Choose a template</div>
            <select class="template-select" id="modalTemplateSelect" onchange="applySelectedTemplate()">
              <option value="">Choose a template</option>
            </select>
            <div class="modal-label">Reply</div>
            <textarea class="modal-textarea" id="modalBody"></textarea>
          </div>
        </section>
      </div>

      <div class="modal-actions">
        <button class="danger" type="button" id="modalRemoveBtn">Remove Suggestion</button>
        <button class="success" type="button" id="modalSendBtn">Send Email</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let state = {
      activeSection: "work",
      orders: [],
      emails: [],
      pendingReplies: [],
      briefing: "",
      stats: {},
      automationSettings: {
        auto_reply_enabled: true,
        auto_scan_enabled: true,
        auto_scan_minutes: 1,
        last_auto_scan_at: ""
      },
      currentModalThreadId: "",
      templates: [],
      templatesLoaded: false,
      isScanning: false,
      autoScanTimer: null,
      dashboardTimer: null,
      hasInitialAutoScan: false
    };

    async function api(path, options = {}) {
      const response = await fetch(path, {
        headers: { "Content-Type": "application/json" },
        ...options
      });

      const data = await response.json();
      if (!response.ok || data.ok === false) throw new Error(data.error || "Request failed");
      return data;
    }

    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.style.display = "block";
      setTimeout(() => { toast.style.display = "none"; }, 5200);
    }

    function setLoading(isLoading, text = "Working...") {
      document.getElementById("loadingBox").style.display = isLoading ? "flex" : "none";
      document.getElementById("scanBtn").disabled = isLoading;
      document.getElementById("statusText").textContent = isLoading ? text : "Ready";
    }

    async function loadDashboard() {
      try {
        setLoading(true, "Refreshing dashboard...");
        const data = await api("/api/dashboard");

        document.getElementById("connectedEmail").textContent = data.connected_email || "Connected Gmail";
        state.orders = Array.isArray(data.orders) ? data.orders : [];
        state.emails = Array.isArray(data.emails) ? data.emails : [];
        state.pendingReplies = Array.isArray(data.pending_replies) ? data.pending_replies : [];
        state.briefing = data.briefing || "";
        state.stats = data.stats || {};
        state.automationSettings = {
          ...state.automationSettings,
          ...(data.automation_settings || {})
        };

        updateStats();
        syncKillSwitchButton();
        startAutoRefreshLoops();
        renderSection();
        triggerInitialAutoScan();
      } catch (error) {
        showToast(error.message);
      } finally {
        setLoading(false);
      }
    }

    function updateStats() {
      const ordersHandled = Number.isFinite(state.stats.orders_replied) ? state.stats.orders_replied : state.orders.filter(order => !order.reply).length;
      const pendingReplies = Number.isFinite(state.stats.pending_replies) ? state.stats.pending_replies : (state.pendingReplies.length || state.orders.filter(order => order.reply).length + state.emails.filter(email => email.reply).length);
      const workEmails = Number.isFinite(state.stats.work_emails) ? state.stats.work_emails : state.emails.filter(email => email.category === "work").length;
      const personalEmails = Number.isFinite(state.stats.personal_emails) ? state.stats.personal_emails : state.emails.filter(email => email.category === "personal").length;

      document.getElementById("ordersReplied").textContent = ordersHandled;
      document.getElementById("pendingReplies").textContent = pendingReplies;
      document.getElementById("workEmails").textContent = workEmails;
      document.getElementById("personalEmails").textContent = personalEmails;

      document.getElementById("pill-orders").textContent = state.orders.length || 0;
      document.getElementById("pill-work").textContent = workEmails;
      document.getElementById("pill-personal").textContent = personalEmails;
    }

    function setSection(section) {
      state.activeSection = section;
      ["orders", "work", "personal", "summary"].forEach(name => {
        document.getElementById(`nav-${name}`).classList.toggle("active", name === section);
      });
      renderSection();
    }

    function renderSection() {
      if (state.activeSection === "orders") renderOrders();
      if (state.activeSection === "work") renderEmailCategory("work");
      if (state.activeSection === "personal") renderEmailCategory("personal");
      if (state.activeSection === "summary") renderSummary();
    }

    function sortNewestFirst(items, dateGetter) {
      return [...items].sort((a, b) => {
        const aValue = new Date(dateGetter(a) || 0).getTime() || 0;
        const bValue = new Date(dateGetter(b) || 0).getTime() || 0;
        return bValue - aValue;
      });
    }

    function renderOrders() {
      setHeader("Orders", "", "Orders stay visible here and are sorted with the newest at the top. New customer welcomes show a Reply button; already handled orders remain visible so you can confirm they were covered.");
      const list = document.getElementById("mainList");
      const orders = sortNewestFirst(state.orders, order => order.sort_ts || order.processed_at || (order.original && order.original.date));

      if (!orders.length) {
        list.innerHTML = `<div class="empty">No recent orders were found yet. Click <strong>Scan Gmail</strong> to check Gmail.</div>`;
        return;
      }

      list.innerHTML = orders.map(order => {
        const isWaiting = Boolean(order.reply);
        const reply = order.reply || {};
        const statusLabel = isWaiting ? "Needs Reply" : (order.status || "Already Replied");

        return `
          <article class="card order-card-simple">
            <div class="card-top">
              <div>
                <h3 class="card-title">Order #${escapeHtml(order.order_number || "Unknown")}</h3>
                <div class="meta order-meta">
                  <strong>Customer:</strong> ${escapeHtml(order.customer_name || "Unknown")}<br>
                  <strong>Email:</strong> ${escapeHtml(order.customer_email || "Unknown")}<br>
                  ${order.total ? `<strong>Total:</strong> ${escapeHtml(order.total)}<br>` : ""}
                  <strong>Status:</strong> ${escapeHtml(statusLabel)}<br>
                  <strong>Updated:</strong> ${formatDate(order.sort_ts || order.processed_at || (order.original && order.original.date))}
                </div>
              </div>
              ${isWaiting
                ? `<button class="expand-btn" type="button" onclick="openReplyModal('${escapeForJs(reply.thread_id)}')">Reply</button>`
                : `<span class="badge green">${escapeHtml(statusLabel)}</span>`}
            </div>
          </article>
        `;
      }).join("");
    }


    function renderEmailCategory(category) {
      const title = category === "work" ? "Work Email" : "Personal Email";
      const badge = "";
      const note = category === "work"
        ? "Only important, reply-worthy work emails are shown here, and they stay sorted with the newest at the top."
        : "Only important, reply-worthy personal emails are shown here, and they stay sorted with the newest at the top.";

      setHeader(title, badge, note);
      const list = document.getElementById("mainList");
      const emails = sortNewestFirst(
        state.emails.filter(email => email.category === category),
        email => email.sort_ts || (email.original && email.original.date) || email.updated_at
      );

      if (!emails.length) {
        list.innerHTML = `<div class="empty">No ${escapeHtml(category)} emails need a response right now. Click <strong>Scan Gmail</strong> to check Gmail.</div>`;
        return;
      }

      list.innerHTML = emails.map(email => renderEmailCard(email)).join("");
    }

    function renderEmailCard(email) {
      const reply = email.reply;
      const original = email.original || {};
      return `
        <article class="card">
          <div class="card-top">
            <div>
              <h3 class="card-title">${escapeHtml(email.title || "Email")}</h3>
              ${email.important_reason ? `<div class="summary" style="margin-top:12px; margin-bottom:0;">${escapeHtml(email.important_reason)}</div>` : ""}
            </div>
            ${reply ? `<button class="expand-btn" type="button" onclick="openReplyModal('${escapeForJs(reply.thread_id)}')">View</button>` : `<span class="badge green">${escapeHtml(email.status || "Handled")}</span>`}
          </div>
          <div class="meta">
            <strong>From:</strong> ${escapeHtml(original.from || "Unknown sender")}<br>
            <strong>Date:</strong> ${escapeHtml(formatSimpleTime(original.date || "Unknown date"))}<br>
            <strong>Status:</strong> ${escapeHtml(email.status || (reply ? "Needs Reply" : "Handled"))}
          </div>
          <div class="email-pair">
            <div class="email-box">
              <div class="box-title original">Original Email</div>
              <div class="box-body"><div class="compact-line"><strong>Subject:</strong> ${escapeHtml(original.subject || "No subject")}</div>${escapeHtml(cleanEmailFull(original.body || "No original email preview available."))}</div>
            </div>
            <div class="email-box">
              ${reply ? renderReplyPreview(reply) : `<div class="box-title response">Reply</div><div class="box-body">${renderNoReply(email)}</div>`}
            </div>
          </div>

          ${reply ? `
            <div class="card-actions">
              <button class="success" onclick="sendSuggestedReply('${escapeForJs(reply.thread_id)}')">Send Email</button>
              <button class="danger" onclick="removeSuggestedReply('${escapeForJs(reply.thread_id)}')">Remove Suggestion</button>
            </div>
          ` : ""}
        </article>
      `;
    }

    function renderReplyPreview(reply) {
      return `
        <div class="box-title response">Response</div>
        <div class="box-body reply-preview-clean">${escapeHtml(cleanEmailPreview(reply.body || "No reply preview available."))}</div>
      `;
    }

    function findReplyContext(threadId) {
      for (const order of state.orders) {
        if (order.reply && String(order.reply.thread_id) === String(threadId)) {
          return {
            type: "order",
            title: `Order #${order.order_number || "Unknown"}`,
            original: order.original || {},
            reply: order.reply
          };
        }
      }

      for (const email of state.emails) {
        if (email.reply && String(email.reply.thread_id) === String(threadId)) {
          return {
            type: email.category || "email",
            title: email.title || "Email reply",
            original: email.original || {},
            reply: email.reply
          };
        }
      }

      return null;
    }


    async function loadTemplates() {
      if (state.templatesLoaded) return state.templates;
      try {
        const data = await api("/api/gmail-templates");
        state.templates = Array.isArray(data.templates) ? data.templates : [];
        state.templatesLoaded = true;
      } catch (error) {
        state.templates = [];
        state.templatesLoaded = true;
      }
      return state.templates;
    }

    function populateTemplateDropdown() {
      const select = document.getElementById("modalTemplateSelect");
      if (!select) return;
      const options = [`<option value="">Choose a template</option>`]
        .concat((state.templates || []).map((template, index) => {
          return `<option value="${index}">${escapeHtml(template.title || `Template ${index + 1}`)}</option>`;
        }));
      select.innerHTML = options.join("");
      select.value = "";
    }

    function applySelectedTemplate() {
      const select = document.getElementById("modalTemplateSelect");
      if (!select || select.value === "") return;
      const template = state.templates[Number(select.value)];
      if (!template) return;
      document.getElementById("modalSubject").value = template.title || document.getElementById("modalSubject").value || "Reply";
      document.getElementById("modalBody").value = template.body || "";
    }

    async function openReplyModal(threadId) {
      const context = findReplyContext(threadId);
      if (!context || !context.reply) {
        showToast("Could not open this reply. Refresh and try again.");
        return;
      }

      state.currentModalThreadId = String(threadId);
      const original = context.original || {};
      const reply = context.reply || {};

      document.getElementById("modalTitle").textContent = context.title;
      document.getElementById("modalSubtitle").textContent = context.type === "order"
        ? "Review the order email and adjust the customer message before sending."
        : "Review the original email and adjust the response before sending.";
      document.getElementById("modalOriginal").textContent = `From: ${original.from || "Unknown sender"}\nDate: ${formatSimpleTime(original.date || "Unknown date")}\nSubject: ${original.subject || "No subject"}\n\n${cleanEmailFull(original.body || "No original body preview available.")}`;
      document.getElementById("modalTo").textContent = reply.to || "Sender";
      document.getElementById("modalSubject").value = reply.subject || "Reply";
      document.getElementById("modalBody").value = reply.body || "";
      populateTemplateDropdown();
      loadTemplates().then(populateTemplateDropdown);

      document.getElementById("modalSendBtn").onclick = () => sendSuggestedReply(threadId);
      document.getElementById("modalRemoveBtn").onclick = () => removeSuggestedReply(threadId);
      document.getElementById("replyModal").classList.add("open");
      document.getElementById("modalBody").focus();
    }

    function closeReplyModal() {
      document.getElementById("replyModal").classList.remove("open");
      state.currentModalThreadId = "";
    }

    function closeReplyModalFromBackdrop(event) {
      if (event.target && event.target.id === "replyModal") closeReplyModal();
    }

    function renderNoReply(email) {
      if (email.reply_sent_at) return `Reply sent on ${formatDate(email.reply_sent_at)}.`;
      return "No reply is currently needed for this email.";
    }

    function renderSummary() {
      setHeader("AI Summary", "Daily review", "A clean overview of what the latest scan found.");
      const friendly = state.briefing && !state.briefing.includes("No summary yet")
        ? state.briefing.replaceAll("# Daily Gmail Briefing", "Daily Gmail Briefing")
        : "No summary yet. Click Scan Gmail to review recent emails.";
      document.getElementById("mainList").innerHTML = `<div class="briefing">${escapeHtml(friendly)}</div>`;
    }

    function setHeader(title, badge, note) {
      document.getElementById("sectionTitle").textContent = title;
      document.getElementById("sectionBadge").textContent = badge || "";
      const noteEl = document.getElementById("sectionNote");
      noteEl.textContent = note || "";
      noteEl.style.display = note ? "block" : "none";
    }

    function syncKillSwitchButton() {
      const button = document.getElementById("killSwitchBtn");
      const enabled = state.automationSettings.auto_reply_enabled !== false;
      button.textContent = enabled ? "Auto Reply: On" : "Auto Reply: Off";
      button.classList.toggle("off", !enabled);
      button.title = enabled
        ? "Auto reply sending is allowed. The app still checks for duplicates before sending."
        : "Auto reply sending is blocked. Auto scanning can still keep the dashboard updated.";
    }

    async function toggleAutoReply() {
      const nextValue = !(state.automationSettings.auto_reply_enabled !== false);
      try {
        const data = await api("/api/automation-settings", {
          method: "POST",
          body: JSON.stringify({ auto_reply_enabled: nextValue })
        });
        state.automationSettings = data.settings || state.automationSettings;
        syncKillSwitchButton();
        showToast(nextValue ? "Auto reply is on." : "Auto reply is off. No replies will be sent until it is turned back on.");
      } catch (error) {
        showToast(error.message);
      }
    }

    async function refreshNow() {
      await scanGmail({ silent: false, automatic: false });
    }

    function triggerInitialAutoScan() {
      if (state.hasInitialAutoScan || state.automationSettings.auto_scan_enabled === false) return;
      state.hasInitialAutoScan = true;
      setTimeout(() => {
        if (!state.isScanning) scanGmail({ silent: true, automatic: true });
      }, 900);
    }

    function startAutoRefreshLoops() {
      if (!state.dashboardTimer) {
        state.dashboardTimer = setInterval(() => {
          if (!state.isScanning) loadDashboard();
        }, 30000);
      }

      const minutes = Math.max(1, Number(state.automationSettings.auto_scan_minutes || 1));
      const intervalMs = minutes * 60 * 1000;

      if (state.autoScanTimer) clearInterval(state.autoScanTimer);

      if (state.automationSettings.auto_scan_enabled !== false) {
        state.autoScanTimer = setInterval(() => {
          if (!state.isScanning) scanGmail({ silent: true, automatic: true });
        }, intervalMs);
      }
    }

    async function scanGmail(options = {}) {
      if (state.isScanning) return;
      state.isScanning = true;
      try {
        setLoading(true, options.automatic ? "Auto scanning Gmail..." : "Scanning Gmail...");
        const data = await api("/api/scan", { method: "POST" });
        if (!options.silent) {
          showToast(`Scan complete. Prepared ${data.order_replies_waiting || 0} order replies for approval, skipped ${data.failed_orders_skipped || 0} failed orders, and prepared ${data.suggested_replies || 0} suggested replies.`);
        }
        await loadDashboard();
      } catch (error) {
        showToast(error.message);
      } finally {
        state.isScanning = false;
        setLoading(false);
      }
    }


    async function toggleFavoriteEmail(threadId, isFavorite) {
      try {
        const method = isFavorite ? "DELETE" : "POST";
        await api(`/api/favorites/${threadId}`, { method });
        showToast(isFavorite ? "Removed from favorites." : "Favorited. This thread will stay on the dashboard.");
        await loadDashboard({ silent: true });
      } catch (error) {
        showToast(error.message);
      }
    }

    async function sendSuggestedReply(threadId) {
      const modalOpen = document.getElementById("replyModal").classList.contains("open") && String(state.currentModalThreadId) === String(threadId);
      const context = findReplyContext(threadId);
      const subject = modalOpen
        ? document.getElementById("modalSubject").value
        : (context && context.reply ? context.reply.subject : "Reply");
      const body = modalOpen
        ? document.getElementById("modalBody").value
        : (context && context.reply ? context.reply.body : "");

      if (state.automationSettings.auto_reply_enabled === false) {
        showToast("Auto reply is off. Turn it on before sending replies.");
        return;
      }

      try {
        setLoading(true, "Sending email...");
        const data = await api(`/api/replies/${threadId}/send`, {
          method: "POST",
          body: JSON.stringify({ subject, body })
        });
        closeReplyModal();
        showToast(data.message || "Email sent successfully.");
        await loadDashboard();
      } catch (error) {
        showToast(error.message);
      } finally {
        setLoading(false);
      }
    }

    async function removeSuggestedReply(threadId) {
      try {
        setLoading(true, "Removing suggestion...");
        await api(`/api/replies/${threadId}`, { method: "DELETE" });
        closeReplyModal();
        showToast("Suggested reply removed.");
        await loadDashboard();
      } catch (error) {
        showToast(error.message);
      } finally {
        setLoading(false);
      }
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) { return escapeHtml(value).replaceAll("`", "&#096;"); }

    function escapeForJs(value) {
      return String(value ?? "")
        .replaceAll("\\", "\\\\")
        .replaceAll("'", "\\'")
        .replaceAll('"', "\\&quot;")
        .replaceAll("\n", " ");
    }


    function normalizeEmailText(value) {
      return String(value ?? "")
        .replace(/\r\n/g, "\n")
        .replace(/\r/g, "\n")
        .replace(/=\n/g, "")
        .replace(/&nbsp;/gi, " ")
        .replace(/<br\s*\/?>/gi, "\n")
        .replace(/<\/p>/gi, "\n")
        .replace(/<[^>]+>/g, "")
        .replace(/[\u00A0\u2000-\u200D\u202F\u2060]/g, " ")
        .replace(/[ \t]+\n/g, "\n")
        .replace(/\n{3,}/g, "\n\n")
        .trim();
    }

    function removeQuotedThread(value) {
      let text = normalizeEmailText(value);

      const quotePatterns = [
        /\n\s*>?\s*On\s+(?:Mon|Tue|Wed|Thu|Fri|Sat|Sun)[\s\S]*?wrote:\s*[\s\S]*$/i,
        /\n\s*>?\s*On\s+.{0,260}?wrote:\s*[\s\S]*$/i,
        /\n\s*-{2,}\s*Original Message\s*-{2,}\s*[\s\S]*$/i,
        /\n\s*From:\s.+\n\s*Sent:\s.+\n\s*To:\s.+\n\s*Subject:\s.+[\s\S]*$/i
      ];

      for (const pattern of quotePatterns) {
        text = text.replace(pattern, "").trim();
      }

      text = text
        .split("\n")
        .filter(line => !/^\s*>/.test(line))
        .join("\n")
        .replace(/\n{3,}/g, "\n\n")
        .trim();

      return text || "No email content available.";
    }

    function cleanEmailPreview(value) {
      return removeQuotedThread(value);
    }

    function cleanEmailFull(value) {
      return normalizeEmailText(value)
        .split("\n")
        .map(line => line.replace(/^\s*>+\s?/, ""))
        .join("\n")
        .replace(/\n{3,}/g, "\n\n")
        .trim();
    }

    function ordinalDay(dayNumber) {
      const suffix = (dayNumber % 10 === 1 && dayNumber % 100 !== 11) ? "st"
        : (dayNumber % 10 === 2 && dayNumber % 100 !== 12) ? "nd"
        : (dayNumber % 10 === 3 && dayNumber % 100 !== 13) ? "rd"
        : "th";
      return `${String(dayNumber).padStart(2, "0")}${suffix}`;
    }

    function formatEmailDateTime(value) {
      if (!value) return "Unknown";

      const parsed = new Date(value);
      if (!Number.isNaN(parsed.getTime())) {
        const month = parsed.toLocaleString("en-US", { month: "long" });
        const day = ordinalDay(parsed.getDate());
        const time = parsed.toLocaleTimeString("en-US", {
          hour: "numeric",
          minute: "2-digit",
          hour12: true
        });
        return `${month} ${day}, ${time}`;
      }

      const raw = String(value);
      const dateMatch = raw.match(/\b(\d{1,2})\s+([A-Za-z]{3,9})\s+\d{4}\b|\b([A-Za-z]{3,9})\s+(\d{1,2}),?\s+\d{4}\b/);
      const timeMatch = raw.match(/\b(\d{1,2}):(\d{2})(?::\d{2})?\b/);

      if (dateMatch && timeMatch) {
        const monthRaw = dateMatch[2] || dateMatch[3];
        const dayRaw = dateMatch[1] || dateMatch[4];
        const monthDate = new Date(`${monthRaw} 1, 2000`);
        const month = Number.isNaN(monthDate.getTime()) ? monthRaw : monthDate.toLocaleString("en-US", { month: "long" });
        let hour = parseInt(timeMatch[1], 10);
        const minute = timeMatch[2];
        const suffix = hour >= 12 ? "PM" : "AM";
        hour = hour % 12 || 12;
        return `${month} ${ordinalDay(parseInt(dayRaw, 10))}, ${hour}:${minute} ${suffix}`;
      }

      return raw;
    }

    function formatSimpleTime(value) {
      return formatEmailDateTime(value);
    }

    function formatDate(value) {
      return formatEmailDateTime(value);
    }

    loadTemplates();
    loadDashboard();
  </script>
</body>
</html>
